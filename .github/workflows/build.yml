name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore app
        run: dotnet restore .\InputFlow.App\InputFlow.App.csproj

      - name: Restore core tests
        run: dotnet restore .\InputFlow.Core.Tests\InputFlow.Core.Tests.csproj

      - name: Build
        run: dotnet build .\InputFlow.App\InputFlow.App.csproj -c Release --no-restore

      - name: Run core tests
        run: dotnet run --project .\InputFlow.Core.Tests\InputFlow.Core.Tests.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish .\InputFlow.App\InputFlow.App.csproj -c Release -r win-x64 --self-contained false -o .\publish\InputFlow-win-x64

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: InputFlow-win-x64
          path: .\publish\InputFlow-win-x64\
